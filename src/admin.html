<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ-панель — School Portal</title>
    <link rel="stylesheet" href="assets/css/main.css">
    <link rel="stylesheet" href="assets/css/admin.css">
</head>
<body>
    <header class="admin-header">
        <div class="admin-header__logo">⚙ Админ-панель</div>
        <a href="index.html" class="admin-header__link">На сайт</a>
        <nav id="admin-header-nav" class="admin-header__nav">
            <button type="button" class="admin-tab" data-panel="classes">Классы</button>
            <button type="button" class="admin-tab" data-panel="subjects">Предметы</button>
            <button type="button" class="admin-tab" data-panel="paragraphs">Параграфы</button>
            <button type="button" class="admin-tab" data-panel="quizzes">Тесты</button>
            <button type="button" class="admin-tab" data-panel="students">Студенты</button>
        </nav>
        <div class="auth-area" id="authArea"></div>
        <div id="admin-header-actions" class="admin-header__actions">
            <button type="button" id="adminExport" class="admin-btn admin-btn--secondary">Экспорт JSON</button>
            <button type="button" id="adminImport" class="admin-btn admin-btn--secondary">Импорт JSON</button>
            <input type="file" id="adminImportFile" accept=".json,application/json" hidden>
            <button type="button" id="adminRevert" class="admin-btn admin-btn--secondary" title="Отменить изменения">Отменить</button>
            <button type="button" id="adminSave" class="admin-btn admin-btn--primary">Сохранить (local)</button>
            <button type="button" id="adminLoadFirebase" class="admin-btn admin-btn--secondary" title="Загрузить контент из Firestore">Загрузить из Firebase</button>
            <button type="button" id="adminSyncFirebase" class="admin-btn admin-btn--primary" title="Записать контент в Firestore">Синхронизировать в Firebase</button>
        </div>
    </header>

    <main class="admin-main">
        <div id="admin-notifications" class="admin-notifications" aria-live="polite"></div>
        <div id="admin-panel" class="admin-panel"></div>
    </main>
</body>
</html>
